
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PastryCalc Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--cream:#f7fbf8;
--green-dark:#1f3d2b;
--green:#2e7d5b;
--green-light:#6bbf8f;
--accent:#3aa76d;
--border:#d9e7df;
--text:#1f3d2b;
--muted:#6b8f7d;
--shadow:0 8px 30px rgba(0,0,0,.05);
--radius:12px;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--cream);
color:var(--text);
}

.topbar{
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
}

.brand{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-family:'Playfair Display',serif;
font-size:18px;
}

.brand-icon{font-size:26px}

.nav-tabs{display:flex;gap:6px}

.nav-tab{
border:none;
background:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
color:var(--muted);
}

.nav-tab.active{
background:var(--green);
color:white;
}

.main{max-width:1100px;margin:auto;padding:26px}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.card{
background:white;
border-radius:var(--radius);
border:1px solid var(--border);
padding:18px;
box-shadow:var(--shadow);
}

.stat-val{font-size:22px;font-weight:700;margin-top:4px}

.section-title{
font-size:24px;
font-family:'Playfair Display',serif;
font-weight:700;
margin-bottom:20px;
}

input{
padding:8px;
border:1px solid var(--border);
border-radius:8px;
width:100%;
}

.batch-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid var(--border);
font-size:14px;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:11px;
background:#e6f4ec;
color:var(--green);
font-weight:600;
}

.page{display:none}
.page.active{display:block}

.search{margin:10px 0 14px}

.btn{
background:var(--green);
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
margin-top:10px;
}

table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{padding:8px;border-bottom:1px solid var(--border);text-align:left}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
<div class="brand-icon">🍪</div>
<div>PastryCalc Pro</div>
</div>

<div class="nav-tabs">
<button class="nav-tab active" onclick="showPage('dashboard',this)">Dashboard</button>
<button class="nav-tab" onclick="showPage('ingredients',this)">Inventory</button>
<button class="nav-tab" onclick="showPage('batches',this)">Batches</button>
<button class="nav-tab" onclick="showPage('sales',this)">Sales</button>
</div>

</div>

<div class="main">

<div id="dashboard" class="page active">

<div class="section-title">Bakery Overview</div>

<div class="grid-4">

<div class="card">
<div>Ingredients</div>
<div class="stat-val" id="d-ingr">0</div>
</div>

<div class="card">
<div>Batches</div>
<div class="stat-val" id="d-batch">0</div>
</div>

<div class="card">
<div>Total Revenue</div>
<div class="stat-val" id="d-revenue">₱0</div>
</div>

<div class="card">
<div>Total Profit</div>
<div class="stat-val" id="d-profit">₱0</div>
</div>

</div>

<div class="card" style="margin-top:20px">

<b>Recent Batches</b>

<input class="search" id="batchSearch" placeholder="Search batch..." oninput="renderDashboard()">

<div id="recentBatches"></div>

</div>

</div>


<div id="ingredients" class="page">
<div class="section-title">Ingredient Inventory</div>

<input id="ingName" placeholder="Ingredient name">
<input id="ingCost" placeholder="Cost">

<button class="btn" onclick="addIngredient()">Add Ingredient</button>

<table id="ingTable">
<tr><th>Name</th><th>Cost</th></tr>
</table>

</div>


<div id="batches" class="page">
<div class="section-title">Batch Production</div>

<input id="batchName" placeholder="Batch name">
<input id="batchYield" placeholder="Pieces produced">
<input id="batchCost" placeholder="Total cost">

<button class="btn" onclick="addBatch()">Create Batch</button>

<table id="batchTable">
<tr><th>Name</th><th>Yield</th><th>Cost</th></tr>
</table>

</div>


<div id="sales" class="page">
<div class="section-title">Sales</div>

<input id="saleBatch" placeholder="Batch name">
<input id="saleRevenue" placeholder="Revenue">
<input id="saleProfit" placeholder="Profit">

<button class="btn" onclick="addSale()">Record Sale</button>

<table id="saleTable">
<tr><th>Batch</th><th>Revenue</th><th>Profit</th></tr>
</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const DB={
load(k,d=[]){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}},
save(k,v){localStorage.setItem(k,JSON.stringify(v))}
}

let ingredients=DB.load("ingredients")
let batches=DB.load("batches")
let sales=DB.load("sales")

function showPage(page,btn){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")

document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"))
btn.classList.add("active")

}

function addIngredient(){

let name=document.getElementById("ingName").value
let cost=parseFloat(document.getElementById("ingCost").value)||0

ingredients.push({name,cost})

DB.save("ingredients",ingredients)

renderIngredients()
renderDashboard()

}

function renderIngredients(){

let html="<tr><th>Name</th><th>Cost</th></tr>"

ingredients.forEach(i=>{
html+=`<tr><td>${i.name}</td><td>₱${i.cost}</td></tr>`
})

document.getElementById("ingTable").innerHTML=html

}

function addBatch(){

let name=document.getElementById("batchName").value
let yieldQty=parseFloat(document.getElementById("batchYield").value)||0
let cost=parseFloat(document.getElementById("batchCost").value)||0

batches.push({
name,
yield:yieldQty,
totalCost:cost,
date:new Date().toLocaleDateString()
})

DB.save("batches",batches)

renderBatches()
renderDashboard()

}

function renderBatches(){

let html="<tr><th>Name</th><th>Yield</th><th>Cost</th></tr>"

batches.forEach(b=>{
html+=`<tr><td>${b.name}</td><td>${b.yield}</td><td>₱${b.totalCost}</td></tr>`
})

document.getElementById("batchTable").innerHTML=html

}

function addSale(){

let name=document.getElementById("saleBatch").value
let revenue=parseFloat(document.getElementById("saleRevenue").value)||0
let profit=parseFloat(document.getElementById("saleProfit").value)||0

sales.push({batchName:name,revenue,profit})

DB.save("sales",sales)

renderSales()
renderDashboard()

}

function renderSales(){

let html="<tr><th>Batch</th><th>Revenue</th><th>Profit</th></tr>"

sales.forEach(s=>{
html+=`<tr><td>${s.batchName}</td><td>₱${s.revenue}</td><td>₱${s.profit}</td></tr>`
})

document.getElementById("saleTable").innerHTML=html

}

function renderDashboard(){

document.getElementById("d-ingr").textContent=ingredients.length
document.getElementById("d-batch").textContent=batches.length

let revenue=sales.reduce((a,b)=>a+b.revenue,0)
let profit=sales.reduce((a,b)=>a+b.profit,0)

document.getElementById("d-revenue").textContent="₱"+revenue.toFixed(2)
document.getElementById("d-profit").textContent="₱"+profit.toFixed(2)

let search=(document.getElementById("batchSearch")?.value||"").toLowerCase()

let list=batches
.filter(b=>b.name.toLowerCase().includes(search))
.reverse()
.slice(0,5)

let html=""

list.forEach(b=>{

let price=(b.totalCost/b.yield)||0

html+=`
<div class="batch-row">
<div>
<div style="font-weight:600">${b.name}</div>
<div style="font-size:12px;color:#888">
${b.date} • ${b.yield} pcs • ₱${price.toFixed(2)} / piece
</div>
</div>
<div class="badge">₱${b.totalCost.toFixed(2)}</div>
</div>
`
})

if(!html) html="<div style='padding:10px;color:#888'>No batches yet</div>"

document.getElementById("recentBatches").innerHTML=html

}

renderIngredients()
renderBatches()
renderSales()
renderDashboard()

</script>

</body>
</html>
