<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastry Cost Pricing System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* UPDATED GREEN THEME COLORS */
    --cream: #f4f7f2;
    --warm-white: #ffffff;
    --brown-dark: #1e2d24; /* Deep Forest */
    --brown-mid: #4a6d55;  /* Sage Green */
    --brown-light: #8eb497; /* Light Sage */
    --rose: #d4856a;       /* Kept as a warm accent for highlights */
    --rose-light: #f5e6df;
    --sage: #5c8d61;
    --sage-light: #e0ede2;
    --gold: #b59431;       /* Adjusted Gold for green context */
    --gold-light: #fcf6e5;
    --border: #dae5db;
    --text-main: #233229;
    --text-muted: #6b7a70;
    --shadow: 0 2px 12px rgba(46, 68, 54, 0.08);
    --shadow-lg: 0 8px 32px rgba(46, 68, 54, 0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-main);
    min-height: 100vh;
    font-size: 14px;
  }

  /* TOP NAV */
  .topbar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 32px; height: 32px;
    background: var(--brown-mid);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--brown-dark);
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-tab:hover { background: var(--sage-light); color: var(--brown-mid); }
  .nav-tab.active { background: var(--brown-mid); color: white; }
  .nav-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* MAIN LAYOUT */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--brown-dark);
  }
  .section-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* CARDS */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--brown-dark);
  }
  .card-value.green { color: var(--sage); }
  .card-value.rose { color: var(--rose); }
  .card-value.gold { color: var(--gold); }

  /* GRID HELPERS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* STAT CARDS ROW */
  .stat-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--brown-dark); }
  .stat-tag { display: inline-block; margin-top: 4px; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .tag-green { background: var(--sage-light); color: var(--sage); }
  .tag-rose { background: var(--rose-light); color: var(--rose); }
  .tag-gold { background: var(--gold-light); color: var(--gold); }

  /* FORM ELEMENTS */
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"], input[type="number"], select, textarea {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-main);
    background: var(--warm-white);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--brown-light); }
  textarea { resize: vertical; min-height: 60px; }

  /* BUTTONS */
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--brown-mid); color: white; }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-rose { background: var(--rose); color: white; }
  .btn-rose:hover { background: #bf6e55; }
  .btn-sage { background: var(--sage); color: white; }
  .btn-sage:hover { background: #608963; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: #b5913e; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--sage-light); color: var(--brown-mid); border-color: var(--brown-mid); }
  .btn-danger { background: transparent; color: #e05555; border: 1px solid #e05555; }
  .btn-danger:hover { background: #ffeaea; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: var(--warm-white); font-size: 13px; }
  th { background: var(--cream); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-main); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--sage-light); color: var(--sage); }
  .badge-rose { background: var(--rose-light); color: var(--rose); }
  .badge-gold { background: var(--gold-light); color: var(--gold); }
  .badge-gray { background: var(--cream); color: var(--text-muted); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* PANEL / SPLIT */
  .split { display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; align-items: start; }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30, 45, 36, 0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--warm-white);
    border-radius: var(--radius);
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--brown-dark);
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* COST BREAKDOWN */
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .breakdown-row:last-child { border: none; font-weight: 700; font-size: 15px; }
  .breakdown-row.total { border-top: 2px solid var(--brown-light); padding-top: 10px; margin-top: 4px; }

  /* HIGHLIGHT BOX */
  .highlight-box { border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 12px; }
  .highlight-box.profit { background: var(--sage-light); border: 1px solid #b8d8ba; }
  .highlight-box.loss { background: var(--rose-light); border: 1px solid #f0b8a5; }
  .highlight-box.neutral { background: var(--gold-light); border: 1px solid #e8d48a; }

  /* INGREDIENT TAG */
  .ing-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px;
    margin: 3px;
  }
  .ing-tag button { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; }
  .ing-tag button:hover { color: var(--rose); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--brown-dark); color: white;
    padding: 12px 20px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s;
    box-shadow: var(--shadow-lg);
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* PROFIT METER */
  .meter-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin: 8px 0; }
  .meter-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* RESPONSIVE SIMPLIFICATIONS */
  @media (max-width: 700px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .split { grid-template-columns: 1fr; }
    .nav-tab span.tab-label { display: none; }
  }

  /* Sell items table inline */
  .sell-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 8px; }
  .sell-row input { flex: 1; }
  .sell-row .qty-wrap { width: 90px; flex-shrink: 0; }
  .sell-row .price-wrap { width: 110px; flex-shrink: 0; }
  .sell-row .del-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 34px; height: 34px; cursor: pointer; color: var(--text-muted); font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sell-row .del-btn:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-light); }

  /* Section spacing */
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-12 { margin-top: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🍪</div>
    <div>
      <div class="brand-name">PastryCalc</div>
      <div class="brand-sub">Cost & Pricing System</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">
      📊 <span class="tab-label">Dashboard</span>
    </button>
    <button class="nav-tab" onclick="showPage('ingredients')">
      🧂 <span class="tab-label">Inventory</span>
    </button>
    <button class="nav-tab" onclick="showPage('batches')">
      🍰 <span class="tab-label">Batches</span>
    </button>
    <button class="nav-tab" onclick="showPage('sales')">
      🛒 <span class="tab-label">Sales</span>
    </button>
  </div>
</div>
